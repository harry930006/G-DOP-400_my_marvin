jenkins:
  systemMessage: "Welcome to the Chocolatine-Powered Marvin Jenkins Instance"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "chocolateen"
          password: ${USER_CHOCOLATEEN_PASSWORD}
          name: "Hugo"
        - id: "vaugie_g"
          password: ${USER_VAUGIE_G_PASSWORD}
          name: "Garance"
        - id: "i_dont_know"
          password: ${USER_I_DONT_KNOW_PASSWORD}
          name: "Jeremy"
        - id: "nasso"
          password: ${USER_NASSO_PASSWORD}
          name: "Nassim"
  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Marvin master"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "chocolateen"
          - name: "ape"
            description: "Pedagogical team members"
            permissions:
              - "Overall/Read"
              - "Job/Build"
            entries:
              - user: "i_dont_know"
          - name: "gorilla"
            description: "1111"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Create"
              - "Job/Configure"
              - "Job/Delete"
              - "Job/Move"
              - "Job/Cancel"
            entries:
              - user: "vaugie_g"
          - name: "assist"
            description: "Assistant"
            permissions:
              - "Overall/Read"
              - "Job/Read"
            entries:
              - user: "nasso"
jobs:
  - file: /var/jenkins_casc_configs/job_dsl.groovy

      